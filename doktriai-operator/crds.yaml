apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: doktriapps.doktri.io
spec:
  group: doktri.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                port:
                  type: integer
                containerPort:
                  type: integer
  names:
    kind: DoktriApp
    plural: doktriapps
    singular: doktriapp
    shortNames:
      - dapp
  scope: Namespaced
