## DOKTRIAI Helm Chart — values.yaml
## Override any value with: helm install doktriai ./doktriai-charts -f my-values.yaml

nameOverride: ""
fullnameOverride: ""

global:
  # Auth mode: "dev" uses header fallback; "production" requires HMAC tokens
  authMode: "dev"
  # HMAC signing secret — override with a strong random value in production
  signingSecret: "doktriai-dev-secret-do-not-use-in-production"
  # Comma-separated additional allowed CORS origins
  corsOrigins: ""

# ── doktriai-api ─────────────────────────────────────────────────────────────
api:
  replicas: 1
  port: 18080
  image:
    repository: doktriai/api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 18080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Persistence ──────────────────────────────────────────────────────────────
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""

# ── Ingress (optional) ───────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: doktriai.local
  tls: []
