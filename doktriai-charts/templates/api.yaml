apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "doktriai.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "doktriai.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "doktriai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "doktriai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: doktriai-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          args:
            - "-addr=:{{ .Values.api.port }}"
            - "-data-dir=/data"
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: DOKTRIAI_AUTH_MODE
              value: {{ .Values.global.authMode | quote }}
            - name: DOKTRIAI_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "doktriai.fullname" . }}-secret
                  key: signingSecret
            - name: DOKTRIAI_CORS_ORIGINS
              value: {{ .Values.global.corsOrigins | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "doktriai.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "doktriai.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "doktriai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "doktriai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
