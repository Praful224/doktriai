apiVersion: v1
kind: Secret
metadata:
  name: {{ include "doktriai.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "doktriai.labels" . | nindent 4 }}
type: Opaque
data:
  signingSecret: {{ .Values.global.signingSecret | b64enc | quote }}
---
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "doktriai.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "doktriai.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "doktriai.fullname" . }}-operator
  labels:
    {{- include "doktriai.labels" . | nindent 4 }}
rules:
  - apiGroups: ["doktriai.io"]
    resources: ["doktriaiapps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "doktriai.fullname" . }}-operator
  labels:
    {{- include "doktriai.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "doktriai.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "doktriai.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "doktriai.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "doktriai.labels" . | nindent 4 }}
